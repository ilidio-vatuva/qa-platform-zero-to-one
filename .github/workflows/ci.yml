name: code-samples CI

# Proves the runnable .NET 8 samples in /code-samples actually
# build and the API tests actually pass on a clean clone.
#
# UI tests (Category=UI) are deliberately skipped here because they
# require a Selenium Grid endpoint (QA_UI_BASEURL). They are exercised
# locally and in the QA pipeline modelled by /code-samples/infra/azure-pipelines.yml.

on:
  push:
    branches: [main]
    paths:
      - 'code-samples/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'code-samples/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code-samples
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore QaPlatform.Samples.sln

      - name: Build (warnings as errors)
        run: dotnet build QaPlatform.Samples.sln -c Release --no-restore /warnaserror

      - name: API tests
        run: |
          dotnet test tests/QaPlatform.ApiTests/QaPlatform.ApiTests.csproj \
            -c Release \
            --no-build \
            --filter "Category!=UI" \
            --logger "console;verbosity=minimal"

      - name: UI tests (will report as Skipped without QA_UI_BASEURL)
        run: |
          dotnet test tests/QaPlatform.UiTests/QaPlatform.UiTests.csproj \
            -c Release \
            --no-build \
            --logger "console;verbosity=minimal"
